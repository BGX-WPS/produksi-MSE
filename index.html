<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Produksi</title>
    <style>
        * {box-sizing: border-box; font-family: Arial, sans-serif; margin:0; padding:0;}
        body {background: #f0f4f8; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px;}
        h1 {color:#005b96; margin-bottom:40px;}
        .menu {display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:20px; width:100%; max-width:500px;}
        .card {background:white; padding:30px 20px; border-radius:10px; text-align:center; text-decoration:none; color:#333; box-shadow:0 3px 10px rgba(0,0,0,0.1); transition:0.3s;}
        .card:hover {transform:translateY(-5px); color:#005b96;}
        .icon {font-size:40px; margin-bottom:10px;}
    </style>
</head>
<body>
    <h1>🏠 SISTEM PRODUKSI</h1>
    <div class="menu">
        <a href="input-produksi.html" class="card">
            <div class="icon">📝</div>
            <h3>Input Data</h3>
        </a>
        <a href="laporan-produksi.html" class="card">
            <div class="icon">📊</div>
            <h3>Lihat Laporan</h3>
        </a>
        <a href="login.html" class="card">
            <div class="icon">⚙️</div>
            <h3>Pengaturan</h3>
        </a>
    </div>
</body>
</html>
