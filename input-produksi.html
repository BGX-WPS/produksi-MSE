<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Produksi</title>
    <style>
        * {box-sizing: border-box; font-family: Arial, sans-serif; margin:0; padding:0;}
        body {background: #f0f4f8; padding:20px; max-width:500px; margin:0 auto;}
        h1 {color:#005b96; text-align:center; margin-bottom:20px;}
        .form-group {margin-bottom:15px;}
        label {display:block; margin-bottom:5px; font-weight:500;}
        input, select {width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px;}
        button {width:100%; padding:12px; background:#0071bc; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;}
        button:hover {background:#005b96;}
        a {color:#0071bc; text-decoration:none; display:inline-block; margin-bottom:15px;}
    </style>
</head>
<body>
    <a href="index.html">← Kembali</a>
    <h1>Form Input Produksi</h1>

    <form id="form">
        <div class="form-group">
            <label>Nama Pekerja</label>
            <select id="pekerja" required><option value="">-- Pilih --</option></select>
        </div>
        <div class="form-group">
            <label>Nama Mesin</label>
            <select id="mesin" required><option value="">-- Pilih --</option></select>
        </div>
        <div class="form-group">
            <label>Nama File / Desain</label>
            <input type="text" id="namaFile" required>
        </div>
        <div class="form-group">
            <label>Jumlah Stitch</label>
            <input type="text" id="stitch" required placeholder="1.000">
        </div>
        <div class="form-group">
            <label>Persentase</label>
            <input type="text" id="persen" value="100%" required>
        </div>
        <div class="form-group">
            <label>Jumlah Dikerjakan</label>
            <input type="number" id="jumlah" required>
        </div>
        <div class="form-group">
            <label>Nama Pemesan</label>
            <input type="text" id="pemesan" required>
        </div>

        <button type="submit">✅ Simpan Data</button>
    </form>
    <a href="laporan-produksi.html" style="margin-top:15px; display:block;">Lihat Laporan →</a>

    <script>
        // LINK ANDA
        const URL_API = "https://script.google.com/macros/s/AKfycbyRFTGf51YWezOXbwp6FqaJ7Y9f7mN6iGn4OshnU6QbgO9fCT0s3wDU1cZvGI_t6LcM/exec";

        // Format ribuan
        document.getElementById('stitch').addEventListener('input', function(){
            let val = this.value.replace(/\D/g,'');
            this.value = val ? val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '';
        });

        // Format persen
        const p = document.getElementById('persen');
        p.addEventListener('input', ()=>{
            let val = p.value.replace(/\D/g,'');
            p.value = val ? val + '%' : '%';
        });
        p.addEventListener('blur', ()=>{if(!p.value || p.value==='%') p.value='100%'});

        // Ambil daftar nama
        async function muat() {
            try {
                let pk = await fetch(URL_API+'?aksi=daftar_pekerja').then(r=>r.json());
                let ms = await fetch(URL_API+'?aksi=daftar_mesin').then(r=>r.json());
                pk.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;pekerja.appendChild(o);});
                ms.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;mesin.appendChild(o);});
            } catch(e) {
                console.log("Tidak ada daftar, lanjutkan..");
            }
        }

        // ==================================================
        // PERBAIKAN: KIRIM TANGGAL DAN WAKTU TERPISAH & RAPI
        // ==================================================
        document.getElementById('form').addEventListener('submit', e=>{
            e.preventDefault();
            
            // Buat format Tanggal: dd/mm/yyyy
            const sekarang = new Date();
            const tgl = String(sekarang.getDate()).padStart(2, '0') + "/" + 
                        String(sekarang.getMonth()+1).padStart(2, '0') + "/" + 
                        sekarang.getFullYear();

            // Buat format Waktu: hh:mm:ss
            const jam = String(sekarang.getHours()).padStart(2, '0') + ":" + 
                        String(sekarang.getMinutes()).padStart(2, '0') + ":" + 
                        String(sekarang.getSeconds()).padStart(2, '0');

            // KIRIM KE SERVER
            fetch(URL_API + 
                `?tanggal=${tgl}` +         // KIRIM TANGGAL SAJA
                `&waktu=${jam}` +           // KIRIM WAKTU SAJA
                `&pekerja=${encodeURIComponent(pekerja.value)}` +
                `&mesin=${encodeURIComponent(mesin.value)}` +
                `&namaFile=${encodeURIComponent(namaFile.value)}` +
                `&stitch=${encodeURIComponent(stitch.value)}` +
                `&persen=${encodeURIComponent(persen.value)}` +
                `&jumlah=${jumlah.value}` +
                `&pemesan=${encodeURIComponent(pemesan.value)}`,
            {method:'POST'})
            .then(()=>{alert('✅ Tersimpan! Cek Sheet, Tanggal & Waktu sudah terpisah.'); e.target.reset(); p.value='100%';})
            .catch(()=>alert('❌ Gagal simpan!'));
        });

        muat();
    </script>
</body>
</html>
