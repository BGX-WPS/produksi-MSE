<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        * {box-sizing: border-box; font-family: Arial, sans-serif; margin:0; padding:0;}
        body {background: #f0f4f8; display:flex; align-items:center; justify-content:center; height:100vh;}
        .box {background:white; padding:30px; border-radius:10px; width:100%; max-width:350px; box-shadow:0 3px 10px rgba(0,0,0,0.1);}
        h2 {text-align:center; color:#005b96; margin-bottom:20px;}
        .form-group {margin-bottom:15px;}
        label {display:block; margin-bottom:5px; font-size:14px;}
        input {width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;}
        button {width:100%; padding:10px; background:#0071bc; color:white; border:none; border-radius:5px; cursor:pointer; font-size:16px;}
        button:hover {background:#005b96;}
        a {display:block; text-align:center; margin-top:15px; color:#0071bc; text-decoration:none;}
    </style>
</head>
<body>
    <div class="box">
        <h2>🔑 LOGIN</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="user" value="admin" readonly>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Masukkan Sandi">
        </div>
        <button onclick="cekLogin()">Masuk</button>
        <a href="index.html">← Kembali</a>
    </div>

    <script>
        const PASS_BENAR = "123456";
        function cekLogin() {
            if(document.getElementById('pass').value === PASS_BENAR) {
                localStorage.setItem('isLogin', 'true');
                window.location.href = "admin.html";
            } else {
                alert("Password salah!");
            }
        }
    </script>
</body>
</html>
