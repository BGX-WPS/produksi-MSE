<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Produksi - Semua Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{primary:'#005b96',secondary:'#0071bc',netral:'#f0f4f8'}}}}
    </script>
</head>
<body class="bg-netral min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-primary text-center mb-6">📊 LAPORAN DATA PRODUKSI</h1>
        <a href="index.html" class="text-secondary mb-4 inline-block"><i class="fa fa-arrow-left"></i> Kembali</a>

        <!-- Panel Admin -->
        <div id="panelAdmin" class="hidden bg-white p-4 rounded-lg shadow mb-5 flex flex-wrap gap-3 items-center justify-between">
            <span class="text-primary font-semibold"><i class="fa fa-user-circle"></i> Mode Admin</span>
            <div>
                <button onclick="unduhExcel()" class="bg-green-600 text-white px-3 py-1 rounded"><i class="fa fa-file-excel-o"></i> Unduh Excel</button>
                <button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">Logout</button>
            </div>
        </div>

        <!-- TABEL DATA (TANPA FILTER) -->
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gradient-to-r from-secondary to-primary text-white">
                    <tr>
                        <th class="p-2 text-center">No</th>
                        <th class="p-2">Tanggal</th>
                        <th class="p-2">Waktu</th>
                        <th class="p-2">Pekerja</th>
                        <th class="p-2">Mesin</th>
                        <th class="p-2">Nama File</th>
                        <th class="p-2 text-right">Stitch</th>
                        <th class="p-2 text-center">Persen</th>
                        <th class="p-2 text-right">Jumlah</th>
                        <th class="p-2">Pemesan</th>
                        <th id="kolomAksi" class="p-2 text-center hidden">Aksi</th>
                    </tr>
                </thead>
                <tbody id="isiTabel" class="divide-y divide-gray-200">
                    <tr><td colspan="11" class="p-4 text-center text-gray-500">🔄 Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ✅ LINK SUDAH DIPASANG
        const URL_API = "https://script.google.com/macros/s/AKfycbyRFTGf51YWezOXbwp6FqaJ7Y9f7mN6iGn4OshnU6QbgO9fCT0s3wDU1cZvGI_t6LcM/exec";

        const IS_ADMIN = localStorage.getItem('isLogin') === 'true';
        let DATA = [];

        function logout() { localStorage.removeItem('isLogin'); location.reload(); }

        // 🔧 PERBAIKAN FORMAT TANGGAL & WAKTU
        function formatTanggal(isoString) {
            if (!isoString) return "-";
            // Jika format waktu dari sheet (1899-12-30 adalah penanda waktu)
            if (isoString.includes("1899-12-30")) {
                const jam = new Date(isoString);
                return jam.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            }
            // Jika format tanggal biasa
            const tgl = new Date(isoString);
            return tgl.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'});
        }

        function formatWaktu(isoString) {
            if (!isoString) return "-";
            const jam = new Date(isoString);
            return jam.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        // AMBIL SEMUA DATA
        async function ambilData() {
            try {
                const res = await fetch(URL_API);
                DATA = await res.json();
                tampilkan();
            } catch (err) {
                console.error(err);
                isiTabel.innerHTML = `<tr><td colspan="11" class="p-4 text-center text-red-500">❌ Gagal memuat data</td></tr>`;
            }
        }

        // TAMPILKAN KE TABEL
        function tampilkan() {
            const isi = document.getElementById('isiTabel');
            isi.innerHTML = '';

            if(DATA.length === 0) {
                isi.innerHTML = `<tr><td colspan="11" class="p-4 text-center text-gray-500">📭 Belum ada data tersimpan</td></tr>`;
                return;
            }

            DATA.forEach((item, i) => {
                let persen = item.persen || "";
                if(persen && !persen.includes('%')) persen = persen + '%';

                const aksi = IS_ADMIN ? `
                <td class="p-1 text-center">
                    <button class="bg-yellow-500 text-white px-1 text-xs rounded" onclick="edit(${i})">Ubah</button>
                    <button class="bg-red-500 text-white px-1 text-xs rounded" onclick="hapus(${i})">Hapus</button>
                </td>` : `<td class="p-1 text-center">-</td>`;

                isi.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-1 text-center">${i+1}</td>
                    <td class="p-1">${formatTanggal(item.tanggal)}</td>
                    <td class="p-1">${formatWaktu(item.waktu)}</td>
                    <td class="p-1">${item.pekerja || "-"}</td>
                    <td class="p-1">${item.mesin || "-"}</td>
                    <td class="p-1">${item.namaFile || "-"}</td>
                    <td class="p-1 text-right">${item.stitch || "-"}</td>
                    <td class="p-1 text-center font-bold text-blue-600">${persen}</td>
                    <td class="p-1 text-right">${item.jumlah || "-"}</td>
                    <td class="p-1">${item.pemesan || "-"}</td>
                    ${aksi}
                </tr>`;
            });
        }

        // FITUR ADMIN
        async function edit(i) {
            const brg = DATA[i];
            const baru = {
                tanggal: prompt('Tanggal:', brg.tanggal), waktu: prompt('Waktu:', brg.waktu),
                pekerja: prompt('Pekerja:', brg.pekerja), mesin: prompt('Mesin:', brg.mesin),
                namaFile: prompt('Nama File:', brg.namaFile), stitch: prompt('Stitch:', brg.stitch),
                persen: prompt('Persen:', brg.persen), jumlah: prompt('Jumlah:', brg.jumlah),
                pemesan: prompt('Pemesan:', brg.pemesan)
            };
            if(!baru.pekerja) return;
            await fetch(`${URL_API}?aksi=ubah&indeks=${i}&data=${encodeURIComponent(JSON.stringify(baru))}`, {method:'POST'});
            ambilData();
        }

        async function hapus(i) {
            if(!confirm('Yakin ingin menghapus?')) return;
            await fetch(`${URL_API}?aksi=hapus&indeks=${i}`, {method:'POST'});
            ambilData();
        }

        // UNDUH EXCEL
        function unduhExcel() {
            const dataUnduh = DATA.map((x,i)=>({
                "No":i+1,
                "Tanggal": formatTanggal(x.tanggal),
                "Waktu": formatWaktu(x.waktu),
                "Pekerja": x.pekerja,
                "Mesin": x.mesin,
                "Nama File": x.namaFile,
                "Stitch": x.stitch,
                "Persen": x.persen,
                "Jumlah": x.jumlah,
                "Pemesan": x.pemesan
            }));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dataUnduh), "Semua Data");
            XLSX.writeFile(wb, "Laporan_Semua_Data.xlsx");
        }

        // MULAI
        window.onload = ()=>{
            if(IS_ADMIN) { 
                document.getElementById('panelAdmin').classList.remove('hidden'); 
                document.getElementById('kolomAksi').classList.remove('hidden'); 
            }
            ambilData();
        };
    </script>
</body>
</html>
