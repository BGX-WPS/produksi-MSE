<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .login-card { background-color: white; padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #005b96; margin-bottom: 2rem; font-size: 1.6rem; font-weight: 600; }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        button { width: 100%; padding: 0.8rem; background-color: #0071bc; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: background 0.3s; }
        button:hover { background-color: #005b96; }
        .pesan-error { color: #dc2626; margin: 1rem 0; display: none; font-weight: 500; }
        .link { display: inline-block; margin-top: 1.5rem; color: #0071bc; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Login Administrator</h1>
        <div class="pesan-error" id="pesanError">⚠️ Username atau Password salah!</div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" value="admin" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button onclick="login()">Masuk</button>
        <a href="index.html" class="link">← Kembali ke Beranda</a>
    </div>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '123456') {
                localStorage.setItem('isLogin', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('pesanError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
